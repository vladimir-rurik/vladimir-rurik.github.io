name: Test, Lint, Build and Deploy on Github Pages

on:
  push:
    branches: ['master', 'main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run tests and linter
      - name: Run tests and linter
        run: npm run lint && npm test

      # Build application
      - name: Build Application
        run: npm run build

      # Deploy application to Github Pages
      - name: Deploy to Github Pages
        uses: JamesIves/github-pages-deploy-action@4.2.1
        with:
          branch: gh-pages
          folder: dist

      #      # Build Storybook
      #      - name: Build Storybook
      #        run: npm run build-storybook
      #
      #      # Deploy Storybook to Github Pages
      #      - name: Deploy Storybook to Github Pages
      #        uses: JamesIves/github-pages-deploy-action@4.2.1
      #        with:
      #          branch: gh-pages
      #          folder: storybook-static
      #          commit-message: "Automatically publish Storybook"

      # Stop execution strictly on failed tests
      - name: Fail on failed tests
        run: |
          if [ ${{ job.status }} == 'failure' ]; then exit 1; fi;
